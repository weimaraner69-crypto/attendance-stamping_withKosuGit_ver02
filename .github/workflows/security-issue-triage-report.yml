name: Security Issue Triage Report

on:
    schedule:
        - cron: "0 18 * * 0"
    workflow_dispatch:
        inputs:
            report_days:
                description: "集計対象の日数（過去N日）"
                required: false
                default: "7"
            unassigned_alert_threshold:
                description: "未アサインopen件数の警告しきい値"
                required: false
                default: "3"

permissions:
    issues: write
    contents: read

concurrency:
    group: security-issue-triage-report-${{ github.ref }}
    cancel-in-progress: false

jobs:
    report:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        env:
            REPORT_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.report_days || '7' }}
            UNASSIGNED_ALERT_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.unassigned_alert_threshold || '3' }}
            RESULT_PATH: /tmp/security-issue-triage-report.json

        steps:
            - name: Collect triage metrics
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPOSITORY: ${{ github.repository }}
                  REPORT_DAYS: ${{ env.REPORT_DAYS }}
                  UNASSIGNED_ALERT_THRESHOLD: ${{ env.UNASSIGNED_ALERT_THRESHOLD }}
                  RESULT_PATH: ${{ env.RESULT_PATH }}
              run: |
                  python - <<'PY'
                  import datetime as dt
                  import json
                  import os
                  import subprocess
                  from pathlib import Path

                  repository = os.environ["REPOSITORY"]
                  report_days = int(os.environ["REPORT_DAYS"])
                  unassigned_alert_threshold = int(os.environ["UNASSIGNED_ALERT_THRESHOLD"])
                  result_path = Path(os.environ["RESULT_PATH"])

                  generated_at = dt.datetime.now(dt.timezone.utc)
                  report_marker = generated_at.strftime("%G-W%V")
                  since_date = (generated_at - dt.timedelta(days=report_days)).strftime("%Y-%m-%d")
                  base_query = f"repo:{repository} is:issue label:security created:>={since_date} SEC- in:title"

                  def search_issues(query: str, per_page: int = 1) -> dict:
                      response = subprocess.run(
                          ["gh", "api", "/search/issues", "-f", f"q={query}", "-f", f"per_page={per_page}"],
                          capture_output=True,
                          text=True,
                          check=True,
                      )
                      return json.loads(response.stdout)

                  total = int(search_issues(base_query)["total_count"])
                  open_count = int(search_issues(f"{base_query} is:open")["total_count"])
                  closed_count = int(search_issues(f"{base_query} is:closed")["total_count"])
                  unassigned_count = int(search_issues(f"{base_query} no:assignee")["total_count"])
                  unassigned_open_count = int(search_issues(f"{base_query} is:open no:assignee")["total_count"])
                  assigned_count = total - unassigned_count
                  items = search_issues(f"{base_query} sort:created-desc", per_page=20)
                  unassigned_items = search_issues(f"{base_query} is:open no:assignee sort:created-desc", per_page=10)

                  report = {
                      "repository": repository,
                      "report_days": report_days,
                      "generated_at": generated_at.isoformat(),
                      "report_marker": report_marker,
                      "since_date": since_date,
                      "total_count": total,
                      "open_count": open_count,
                      "closed_count": closed_count,
                      "assigned_count": assigned_count,
                      "unassigned_count": unassigned_count,
                      "unassigned_open_count": unassigned_open_count,
                      "unassigned_alert_threshold": unassigned_alert_threshold,
                      "unassigned_alert_exceeded": unassigned_open_count >= unassigned_alert_threshold,
                      "sample_issues": [
                          {
                              "number": issue["number"],
                              "title": issue["title"],
                              "state": issue["state"],
                              "html_url": issue["html_url"],
                              "assignee": (issue.get("assignee") or {}).get("login"),
                              "created_at": issue["created_at"],
                          }
                          for issue in items.get("items", [])
                      ],
                      "unassigned_sample_issues": [
                          {
                              "number": issue["number"],
                              "title": issue["title"],
                              "state": issue["state"],
                              "html_url": issue["html_url"],
                              "author_login": (issue.get("user") or {}).get("login"),
                              "created_at": issue["created_at"],
                          }
                          for issue in unassigned_items.get("items", [])
                      ],
                  }

                  result_path.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
                  PY

            - name: Write triage report summary
              if: always()
              env:
                  RESULT_PATH: ${{ env.RESULT_PATH }}
              run: |
                  python - <<'PY'
                  import json
                  import os
                  from pathlib import Path

                  result_path = Path(os.environ["RESULT_PATH"])
                  summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

                  if not result_path.exists():
                      summary_path.write_text(
                          "## Security Issue Triage Report\n\n結果ファイルが見つからないため、ログを確認してください。\n",
                          encoding="utf-8",
                      )
                      raise SystemExit(0)

                  data = json.loads(result_path.read_text(encoding="utf-8"))

                  lines = [
                      "## Security Issue Triage Report",
                      "",
                      f"- repository: {data['repository']}",
                      f"- report_days: {data['report_days']}",
                      f"- since_date: {data['since_date']}",
                      f"- total_count: {data['total_count']}",
                      f"- open_count: {data['open_count']}",
                      f"- closed_count: {data['closed_count']}",
                      f"- assigned_count: {data['assigned_count']}",
                      f"- unassigned_count: {data['unassigned_count']}",
                      f"- unassigned_open_count: {data['unassigned_open_count']}",
                      f"- unassigned_alert_threshold: {data['unassigned_alert_threshold']}",
                      "",
                  ]

                  if data.get("unassigned_alert_exceeded"):
                      lines.append(
                          f"### 🚨 Unassigned Open Issues Alert (threshold={data['unassigned_alert_threshold']}, count={data['unassigned_open_count']})"
                      )
                  else:
                      lines.append(
                          f"### Unassigned Open Issues (threshold={data['unassigned_alert_threshold']}, count={data['unassigned_open_count']})"
                      )

                  unassigned_issues = data.get("unassigned_sample_issues", [])
                  if not unassigned_issues:
                      lines.append("- なし")
                  else:
                      for issue in unassigned_issues:
                          lines.append(
                              f"- #{issue['number']} [{issue['title']}]({issue['html_url']}) "
                              f"| state={issue['state']} | created={issue['created_at']}"
                          )

                  lines.extend(
                      [
                          "",
                          "### Sample Issues (max 20)",
                      ]
                  )

                  issues = data.get("sample_issues", [])
                  if not issues:
                      lines.append("- 対象Issueなし")
                  else:
                      for issue in issues:
                          assignee = issue.get("assignee") or "none"
                          lines.append(
                              f"- #{issue['number']} [{issue['title']}]({issue['html_url']}) "
                              f"| state={issue['state']} | assignee={assignee} | created={issue['created_at']}"
                          )

                  summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
                  PY

            - name: Notify unassigned issues
              if: always()
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPOSITORY: ${{ github.repository }}
                  REPOSITORY_OWNER: ${{ github.repository_owner }}
                  RESULT_PATH: ${{ env.RESULT_PATH }}
                  REPORT_DAYS: ${{ env.REPORT_DAYS }}
              run: |
                  python - <<'PY'
                  import json
                  import os
                  import subprocess
                  from pathlib import Path

                  result_path = Path(os.environ["RESULT_PATH"])
                  summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

                  if not result_path.exists():
                      raise SystemExit(0)

                  data = json.loads(result_path.read_text(encoding="utf-8"))
                  if not data.get("unassigned_alert_exceeded"):
                      raise SystemExit(0)

                  repository = os.environ["REPOSITORY"]
                  repository_owner = os.environ["REPOSITORY_OWNER"]
                  report_days = os.environ["REPORT_DAYS"]
                  threshold = data["unassigned_alert_threshold"]
                  count = data["unassigned_open_count"]
                  marker = data.get("report_marker", "weekly")
                  signature = f"<!-- security-issue-triage-report:{marker} -->"

                  commented = 0
                  skipped = 0

                  for issue in data.get("unassigned_sample_issues", []):
                      issue_number = issue["number"]
                      author_login = issue.get("author_login") or ""
                      implementer_candidate = f"@{author_login}" if author_login else "(未取得)"
                      reviewer_candidate = f"@{repository_owner}" if repository_owner else "(未設定)"

                      comments_response = subprocess.run(
                          [
                              "gh",
                              "api",
                              f"/repos/{repository}/issues/{issue_number}/comments",
                              "-f",
                              "per_page=30",
                          ],
                          capture_output=True,
                          text=True,
                          check=True,
                      )
                      comments = json.loads(comments_response.stdout)

                      if any(signature in (comment.get("body") or "") for comment in comments):
                          skipped += 1
                          continue

                      body = "\n".join(
                          [
                              "⚠️ セキュリティIssueトリアージ週次レポートで未アサインを検知しました。",
                              "",
                              f"- report_days: {report_days}",
                              f"- unassigned_open_count: {count}",
                              f"- threshold: {threshold}",
                              f"- 実装担当候補: {implementer_candidate}",
                              f"- レビュー担当候補: {reviewer_candidate}",
                              "- action: assignee を設定し、対応方針をIssueへ追記してください。",
                              "",
                              signature,
                          ]
                      )

                      subprocess.run(
                          ["gh", "issue", "comment", str(issue_number), "--body", body],
                          check=True,
                      )
                      commented += 1

                  with summary_path.open("a", encoding="utf-8") as summary:
                      summary.write("\n")
                      summary.write("### Unassigned Notification Result\n")
                      summary.write(f"- commented_count: {commented}\n")
                      summary.write(f"- skipped_count: {skipped}\n")
                  PY

            - name: Upload triage report artifact
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: security-issue-triage-report-${{ github.run_id }}
                  path: ${{ env.RESULT_PATH }}
                  if-no-files-found: warn
                  retention-days: 30
